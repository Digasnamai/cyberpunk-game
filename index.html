<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CYBERPUNK ><#>
    </title>
    <!-- Link to our external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- menu inicial -->
    <div id="main-menu" class="screen active">
        <h1 class="title-glitch">CYBERPUNK ><#>
        </h1>
        <div class="menu-options">
            <button class="btn menu-btn" id="btn-new-game">NEW GAME</button>
            <button class="btn menu-btn" id="btn-level-select">LEVEL SELECTION</button>
        </div>
    </div>

    <!-- intro sequence -->
    <div id="Intro-screen" class="screen">

        <!-- Container para as 2D map images. js dá toggle á 'visible' class para dar highlight a cada territorio -->
        <div id="intro-map-container">
            <img id="map-base" src="media/map-base.png" class="map-layer">
            <img id="map-matosinhos" src="media/map-matosinhos.png" class="map-layer map-overlay">
            <img id="map-militech" src="media/map-militech.png" class="map-layer map-overlay">
            <img id="map-asec" src="media/map-asec.png" class="map-layer map-overlay">
        </div>

        <div class="dialogue-box">
            <div id="dialogue-speaker" class="dialogue-speaker">SYSTEM</div>
            <div id="dialogue-text" class="dialogue-text"></div>
            <button class="btn" id="btn-next-dialogue">NEXT >></button>
        </div>
    </div>

    <!-- sistema de diálogo -->
    <div id="character-dialogue-screen" class="screen">

        <!-- Personagem do lado essquerdo -->
        <div class="dialogue-container-split" id="split-container">
            <div class="character-pane" id="pane-left">
                <div class="portrait" id="portrait-left">NYX</div>
                <div class="dialogue-box-split" id="box-left">
                    <div class="dialogue-text" id="text-left"></div>
                </div>
            </div>

            <!-- Personagem do lado direito -->
            <div class="character-pane inactive" id="pane-right">
                <div class="portrait" id="portrait-right">Character</div>
                <div class="dialogue-box-split" id="box-right">
                    <div class="dialogue-text" id="text-right"></div>
                </div>
            </div>
        </div>

        <!-- indicador de que é preciso premir o rato para continuar -->
        <div class="dialogue-instructions">&lt;Click anywhere to continue&gt;</div>
    </div>

    <!-- seleção de níveis -->
    <div id="world-map" class="screen">
        <h2 id="map-title">LEÇAS PORT REGION MAP</h2>
        <div class="map-container">
            <button class="btn map-node" data-level="0">TUTORIAL</button>
            <button class="btn map-node" data-level="1">1. MANUFACTURING FACILITY</button>
            <button class="btn map-node" data-level="2">2. ADMINISTRATIVE BUILDING</button>
            <button class="btn map-node" data-level="3">3. CONTAINER YARD</button>
            <button class="btn map-node" data-level="4">4. TESTING GROUNDS</button>
            <button class="btn map-node" data-level="5">5. CONTROL TOWER</button>
            <button class="btn map-node" data-level="6">TEST LEVEL</button>
            <button class="btn menu-btn" id="btn-back-menu">BACK TO MENU</button>
        </div>
    </div>

    <!-- div para todos os elementos dentro de gameplay -->
    <div id="game-ui" class="screen">

        <!-- overlay de tutoriais, apenas aparece se a data de cada nivel tiver o array tutorial-->
        <div id="tutorial-overlay" class="tutorial-overlay">
            <div class="tutorial-box">
                <div class="tutorial-media" id="tutorial-media-container">
                    <!-- imagem ou vídeo são metidos aqui por js -->
                </div>
                <div class="tutorial-content">
                    <h2 id="tutorial-title"></h2>
                    <div id="tutorial-text" class="dialogue-text tutorial-text-spaced"></div>
                    <div class="tutorial-controls">
                        <button class="btn" id="btn-prev-tutorial"><< PREV</button>
                        <button class="btn" id="btn-next-tutorial">NEXT >></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- parte esquerda do UI com a vida e as ações que se podem tomar-->
        <div id="ui-left">
            <!-- num de ações no meatspace -->
            <div class="phys-only stat-label">ACTION POINTS: <span id="ap-display">4</span></div>
            <!-- num de ações no netspace -->
            <div class="net-only stat-label net-label">NET ACTIONS: <span id="net-ap-display">2</span></div>

            <!-- Fim de turno (também possível com a barra de espaço) -->
            <button class="btn" id="btn-end-turn">END TURN</button>

            <!-- Barra de vida -->
            <div class="net-only stat-label">NEURAL INTEGRITY</div>
            <div class="hp-container net-only">
                <div id="hp-bar"></div>
            </div>

            <!-- movimento de Netrunning -->
            <button class="btn net-only" id="btn-up">ASCEND</button>
            <button class="btn net-only" id="btn-down">DIVE</button>

            <div class="net-only ui-spacer"></div>

            <!-- programas de Netrunning -->
            <button class="btn net-only" id="btn-sonar">SONAR.EXE</button>
            <button class="btn net-only" id="btn-swim">SWIM.EXE</button>
            <button class="btn net-only attack-btn" id="btn-harpoon">HARPOON.EXE</button>
            <button class="btn net-only attack-btn" id="btn-swordfish">SWORDFISH.EXE</button>
            <button class="btn net-only defense-btn" id="btn-scales">SCALES.EXE</button>
        </div>

        <!-- pilha representativa dos níveis dentro de uma architecture-->
        <div id="ui-right" class="net-only">
            <div id="stack-container"></div>
        </div>

        <!-- overlay para quando o jogador recebe dano dentro de uma architecture-->
        <div id="damage-overlay"></div>

        <!-- Container para o log de eventos, menssagens anteriores passam para o histórico quando aparece uma mensagem nova -->
        <div id="log-wrapper" class="log-wrapper">
            <div id="log-history" class="log-history"></div>
            <div id="log-current" class="log-current"></div>
        </div>
    </div>

    <!-- import map para o three.js -->
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    } 
    </script>

    <script type="module" src="js/main.js"></script>

</body>

</html>
